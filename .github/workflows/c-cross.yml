name: Release static binaries

#
# This action builds, tests, and releases new versions of gab.
#
# Currently, all windows builds are disabled.
#
# This is because there are some c-abi issues with zig cc, and these affect
# only the windows platform. Until these bugs are fixed in zig cc, Gab will not
# support windows.
#
# (Unless I feel ike refactoring all the code that is using these abi features - passing structs as arguments).

on:
  push:
    branches: [ "main" ]

env:
  version: 0.1.0
  GH_TOKEN: ${{ github.token }}

jobs:
  build_artifacts:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64
        build_type:
          - release
          - debugoptimized
        include:
          - target: x86_64
            dlltool: x86_64-w64-mingw32-dlltool -m i386:x86-64
          - target: aarch64-windows-gnu
            dlltool: x86_64-w64-mingw32-dlltool -m arm64
          - cmd: ./build-x86_64-linux-gnu/gab/gab

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

      # Zig is the C compiler used by the build system
    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: master

      # Build system depends on Go
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - uses: actions/setup-node@v5
      with:
        node-version: 24

      # Build system tool
    - name: Install Clide
      run: go install github.com/TeddyRandby/clide@latest

    - name: Install binutils
      run: sudo apt-get -y install binutils-mingw-w64

    - name: Configure
      run: clide configure -t='x86_64-linux-gnu ${{ matrix.arch }}-linux-gnu ${{ matrix.arch }}-macos-none ${{ matrix.arch }}-windows-gnu' -b='${{ matrix.build_type }}'

    - name: Build
      run: DLLTOOL='${{ matrix.dlltool }}' clide build

    - name: Collect native modules into local package
      run: |
          cp build-${{ matrix.arch }}-linux-gnu/mod/* github.com/gab-language/cgab@0.1.0/mod
          cp build-${{ matrix.arch }}-macos-none/mod/* github.com/gab-language/cgab@0.1.0/mod
          cp build-${{ matrix.arch }}-windows-gnu/mod/* github.com/gab-language/cgab@0.1.0/mod

    - name: Create bundles
      run: |
          ${{ matrix.cmd }} build -n -t ${{ matrix.arch }}-linux-gnu   < bundle
          ${{ matrix.cmd }} build -n -t ${{ matrix.arch }}-macos-none  < bundle
          ${{ matrix.cmd }} build -n -t ${{ matrix.arch }}-windows-gnu  < bundle

    - name: Upload Binary Artifact
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-linux-gnu'
        path: 'build-${{ matrix.arch }}-linux-gnu/gab/gab'

    - name: Upload Static Library
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-linux-gnu-lib'
        path: 'build-${{ matrix.target }}/libcgab.a'

    - name: Upload Headers
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-linux-gnu-h' 
        path: include

    - name: Upload Module Artifacts
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-linux-gnu-modules'
        path: |
          github.com/gab-language/cgab@0.1.0/mod/*.gab
          github.com/gab-language/cgab@0.1.0/mod/*.so

    - name: Upload Binary Artifact
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-macos-none'
        path: 'build-${{ matrix.arch }}-macos-none/gab/gab'

    - name: Upload Static Library
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-macos-none-lib'
        path: 'build-${{ matrix.target }}/libcgab.a'

    - name: Upload Headers
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-macos-none-h' 
        path: include

    - name: Upload Module Artifacts
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-macos-none-modules'
        path: |
          github.com/gab-language/cgab@0.1.0/mod/*.gab
          github.com/gab-language/cgab@0.1.0/mod/*.dylib

    - name: Upload Binary Artifact
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-windows-gnu'
        path: 'build-${{ matrix.arch }}-windows-gnu/gab/gab'

    - name: Upload Static Library
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-windows-gnu-lib'
        path: 'build-${{ matrix.target }}/libcgab.a'

    - name: Upload Headers
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-windows-gnu-h' 
        path: include

    - name: Upload Module Artifacts
      uses: pyTooling/upload-artifact@v4
      with:
        name: 'gab-${{ matrix.build_type }}-${{ matrix.arch }}-windows-gnu-modules'
        path: |
          github.com/gab-language/cgab@0.1.0/mod/*.gab
          github.com/gab-language/cgab@0.1.0/mod/*.dll

  run_tests:
    strategy:
      matrix:
        build_type:
          - release
        os: 
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            cmd: ./build-x86_64-linux-gnu/gab/gab
          - os: macos-latest
            target: aarch64-macos-none
            cmd: ./build-aarch64-macos-none/gab/gab
          - os: windows-latest
            target: x86_64-windows-gnu
            cmd: build-x86_64-windows-gnu\gab\gab.exe

    runs-on: ${{ matrix.os }}
    needs: build_artifacts

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Binary
        uses: pyTooling/download-artifact@v4
        with:
          name: 'gab-${{ matrix.build_type }}-${{ matrix.target }}'

      - name: Download Modules
        uses: pyTooling/download-artifact@v4
        with:
          name: gab-${{ matrix.build_type }}-${{ matrix.target }}-modules

      - name: Run help
        run: ${{ matrix.cmd }} help

      - name: Run Smallest Hello World
        run: ${{ matrix.cmd }} exec "'hello world!'"

      - name: Run Hello World
        run: ${{ matrix.cmd }} exec "'hello world!' .println"

      - name: Run tests
        run: ${{ matrix.cmd }} run test

  create_release:
    runs-on: ubuntu-latest
    needs: run_tests

    permissions: write-all

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Check for existing tag
        continue-on-error: true
        id: tag_check
        run: git ls-remote --tags | grep '${{ env.version }}' 

      # Create a release if we didn't find an existing tag
      - name: Create Release
        if: ${{ steps.tag_check.outcome == 'failure' }}
        run:  gh release create -R '${{ github.repository }}' '${{ env.version }}' --generate-notes

  release_artifacts:
    runs-on: ubuntu-latest
    needs: create_release

    permissions: write-all

    strategy:
      matrix:
        target:
          - x86_64-linux-gnu
          - x86_64-macos-none
          - x86_64-windows-gnu
          - aarch64-linux-gnu
          - aarch64-macos-none
          - aarch64-windows-gnu
        build_type:
          - release
          - debugoptimized

    steps:
      # Download artifacts created by the build step
      - name: Download Binary
        uses: pyTooling/download-artifact@v4
        with:
          name: 'gab-${{ matrix.build_type }}-${{ matrix.target }}'

      - name: Download Library
        uses: pyTooling/download-artifact@v4
        with:
          name: 'gab-${{ matrix.build_type }}-${{ matrix.target }}-lib'

      - name: Download Headers
        uses: pyTooling/download-artifact@v4
        with:
          name: 'gab-${{ matrix.build_type }}-${{ matrix.target }}-h'

      - name: Download Modules
        uses: pyTooling/download-artifact@v4
        with:
          name: 'gab-${{ matrix.build_type }}-${{ matrix.target }}-modules'
      
      - name: Rename Binary (WINDOWS)
        if: ${{ contains(matrix.target, 'windows') }}
        run: mv build-${{ matrix.target }}/gab/gab.exe 'gab-${{ matrix.build_type }}-${{ matrix.target }}.exe'

      - name: Rename Binary (NONWINDOWS)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: mv build-${{ matrix.target }}/gab/gab.exe 'gab-${{ matrix.build_type }}-${{ matrix.target }}.exe'

      - name: Rename Library
        run: mv build-${{ matrix.target }}/libcgab.a 'libcgab.a'

      - name: Create Module Archive
        run: tar -cvzf 'gab-${{ matrix.build_type }}-${{ matrix.target }}-modules' mod/*

      - name: Create Dev Archive
        run: tar -cvzf 'gab-${{ matrix.build_type }}-${{ matrix.target }}-dev' 'libcgab.a' include/*

      - name: Attach Binary to Release
        run: gh release upload -R '${{ github.repository }}' '${{ env.version }}' 'gab-${{ matrix.build_type }}-${{ matrix.target }}' || exit 0

      - name: Attach Modules to Release
        run: gh release upload -R '${{ github.repository }}' '${{ env.version }}' 'gab-${{ matrix.build_type }}-${{ matrix.target }}-modules' || exit 0

      - name: Attach Dev to Release
        run: gh release upload -R '${{ github.repository }}' '${{ env.version }}' 'gab-${{ matrix.build_type }}-${{ matrix.target }}-dev' || exit 0
